<!DOCTYPE html>
<html lang="vi">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Danh sách lịch hẹn | Affiliate Live Co.</title>
  <link rel="stylesheet" href="../css/style.css">
  <link rel="stylesheet" href="../css/admin.css">
</head>
<body class="admin-body" data-admin-page="appointments">
  <div class="admin-shell">
    <aside class="admin-sidebar">
      <a class="brand" href="../index.html">
        <img class="brand-logo" src="../assets/company-logo.png" alt="VGrow Agency">
      </a>
      <nav class="admin-nav" aria-label="Menu admin">
        <a href="dashboard.html">Dashboard</a>
        <a class="active" href="appointments.html">Lịch hẹn</a>
        <a href="../index.html">Xem website</a>
      </nav>
      <button class="admin-logout" type="button" data-logout>Đăng xuất</button>
    </aside>

    <main class="admin-main">
      <div class="admin-topbar">
        <div>
          <h1>Danh sách lịch hẹn</h1>
          <p>Tìm kiếm, lọc và xem chi tiết lịch hẹn mới nhất.</p>
        </div>
        <div class="admin-user">
          <span>Admin</span>
          <strong data-admin-name>Đang tải...</strong>
        </div>
      </div>

      <div class="admin-message" id="adminMessage" role="status"></div>

      <section class="admin-panel">
        <form class="filter-form" id="appointmentFilterForm">
          <div class="form-field">
            <label for="search">Tìm kiếm</label>
            <input id="search" name="search" type="search" placeholder="Họ tên, số điện thoại, email">
          </div>
          <div class="form-field">
            <label for="service">Dịch vụ</label>
            <select id="service" name="service">
              <option value="">Tất cả</option>
              <option value="AFFILIATE">Tiếp thị liên kết</option>
              <option value="LIVESTREAM">Livestream bán hàng</option>
              <option value="FULL_PACKAGE">Gói bao trọn</option>
            </select>
          </div>
          <div class="form-field">
            <label for="status">Trạng thái</label>
            <select id="status" name="status">
              <option value="">Tất cả</option>
              <option value="PENDING">Chờ xác nhận</option>
              <option value="CONFIRMED">Đã xác nhận</option>
              <option value="COMPLETED">Đã hoàn thành</option>
              <option value="CANCELLED">Đã hủy</option>
            </select>
          </div>
          <div class="form-field">
            <label for="date">Ngày hẹn</label>
            <input id="date" name="date" type="date">
          </div>
          <div class="admin-actions">
            <button class="btn btn-primary" type="submit">Lọc</button>
            <button class="btn btn-outline" type="reset" id="resetFilters">Xóa lọc</button>
          </div>
        </form>

        <div class="table-wrap">
          <table class="admin-table">
            <thead>
              <tr>
                <th>Mã lịch hẹn</th>
                <th>Họ và tên</th>
                <th>Số điện thoại</th>
                <th>Gmail / Email</th>
                <th>Dịch vụ quan tâm</th>
                <th>Ngày hẹn</th>
                <th>Giờ hẹn</th>
                <th>Trạng thái</th>
                <th>Hành động</th>
              </tr>
            </thead>
            <tbody id="appointmentsTableBody">
              <tr><td colspan="9">Đang tải dữ liệu...</td></tr>
            </tbody>
          </table>
        </div>

        <div class="pagination">
          <button class="btn btn-outline" type="button" id="prevPage">Trang trước</button>
          <span id="pageInfo">Trang 1 / 1</span>
          <button class="btn btn-outline" type="button" id="nextPage">Trang sau</button>
        </div>
      </section>
    </main>
  </div>

  <script src="../js/admin.js"></script>
</body>
</html>
